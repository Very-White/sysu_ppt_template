<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中山大学PPT模板</title>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">

  <!-- Prism.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css">

  <!-- SYSU Theme -->
  <link rel="stylesheet" href="css/sysu-theme.css">
  <link rel="stylesheet" href="css/sysu-layouts.css">
</head>
<body>

<div
  id="slide-deck"
  data-sysu-config
  data-author="Very-White"
  data-title="中山大学PPT模板"
  data-date=""
  data-logo="libs/sysu_logo.png"
  data-watermark="true"
>
</div><!-- #slide-deck -->

<!-- KaTeX -->
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

<!-- Prism.js -->
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-c.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-java.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>

<!-- Section Loader (must run before sysu-slide.js) -->
<script src="js/section-loader.js"></script>

<!-- SYSU Slide Engine -->
<script src="js/sysu-slide.js"></script>

<script>
  (function () {
    var deck = document.getElementById('slide-deck');
    if (!deck) return;
    var today = new Date();
    deck.dataset.date = today.getFullYear() + '年' + (today.getMonth() + 1) + '月' + today.getDate() + '日';
  })();
</script>

</body>
</html>
